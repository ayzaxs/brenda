<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha playlist sobre você</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="justify-content: center;">

    <h2>"Algumas coisas a gente não pensa, só sente..." ou <em>ouve</em> se tiver uma playlist tão boa.</h2>

    <div class="heart-container">
        <div class="heart"></div>
    </div>

    <div style="width: 100%; max-width: 600px; margin-top: 1rem;">
        <iframe style="border-radius:12px" 
            src="https://open.spotify.com/embed/playlist/41iukMVSsYgZxFVgKjeYow?utm_source=generator&theme=0" 
            width="100%" 
            height="600" 
            frameBorder="0.5" 
            allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy">
        </iframe>
    </div>

    <nav>
        <a href="cartas.html" class="btn" style="background: transparent; color: var(--text-main); border: 1px solid var(--text-sub);">Cartas</a>
    </nav>

</body>
</html>
